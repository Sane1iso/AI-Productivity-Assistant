<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Email Generator · AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f7f5;
    --card: #ffffff;
    --border: #e4e4e0;
    --text: #1a1a1a;
    --muted: #767676;
    --accent: #2563eb;
    --accent-bg: #eff6ff;
    --danger: #dc2626;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04);
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1.5rem 4rem;
    max-width: 680px;
    margin: 0 auto;
  }
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2.5rem;
  }
  nav a {
    font-size: 13px;
    color: var(--muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: color 0.15s;
  }
  nav a:hover { color: var(--text); }
  nav .page-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    background: var(--card);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 20px;
  }
  h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 6px; }
  .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 2rem; line-height: 1.55; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: var(--shadow);
    margin-bottom: 1rem;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }
  label { font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  input, select, textarea {
    width: 100%;
    padding: 10px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    outline: none;
    transition: border-color 0.15s;
    appearance: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); background: #fff; }
  textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 22px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    border-radius: 8px;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.15s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 14px;
    font-size: 12px;
  }
  .btn-ghost:hover { border-color: #c0c0b8; color: var(--text); }
  .output-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    display: none;
  }
  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .output-header span { font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; }
  .output-body { padding: 24px; font-size: 14px; line-height: 1.75; white-space: pre-wrap; color: var(--text); min-height: 60px; }
  .loading { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 13px; padding: 20px 24px; }
  .dots { display: flex; gap: 4px; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); animation: pulse 1.3s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:0.2}40%{opacity:1} }
  .disclaimer {
    margin-top: 1rem;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid #fde68a;
    background: #fffbeb;
    font-size: 12px;
    color: #92400e;
    line-height: 1.6;
  }
  .error { border-color: #fca5a5; background: #fef2f2; color: var(--danger); padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-top: 1rem; }
  @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<nav>
  <a href="index.html">← Back to home</a>
  <span class="page-label">Tool 1 of 3</span>
</nav>

<h1>✉️ Smart Email Generator</h1>
<p class="subtitle">Fill in the details below and Claude will draft a complete, professional email for you.</p>

<div class="card">
  <div class="form-row">
    <div class="field">
      <label for="audience">Recipient type</label>
      <select id="audience">
        <option>Client</option>
        <option>Manager</option>
        <option>Team member</option>
        <option>Colleague</option>
        <option>Vendor / Supplier</option>
        <option>HR Department</option>
      </select>
    </div>
    <div class="field">
      <label for="tone">Email tone</label>
      <select id="tone">
        <option>Formal</option>
        <option>Informal / Friendly</option>
        <option>Persuasive</option>
        <option>Apologetic</option>
        <option>Assertive</option>
        <option>Grateful</option>
      </select>
    </div>
  </div>

  <div class="field">
    <label for="context">Purpose / context <span style="color:#dc2626">*</span></label>
    <textarea id="context" placeholder="Describe what the email is about. E.g. Follow up on a proposal sent last week, asking the client for feedback and next steps..."></textarea>
  </div>

  <div class="form-row">
    <div class="field">
      <label for="sender">Your name & role (optional)</label>
      <input type="text" id="sender" placeholder="e.g. Sipho Dlamini, PM">
    </div>
    <div class="field">
      <label for="recipient-name">Recipient name (optional)</label>
      <input type="text" id="recipient-name" placeholder="e.g. Ms. Mokoena">
    </div>
  </div>

  <button class="btn btn-primary" id="generate-btn" onclick="generateEmail()">
    ✦ Generate email
  </button>
</div>

<div class="output-card" id="output-card">
  <div class="output-header">
    <span>Generated email</span>
    <button class="btn btn-ghost" onclick="copyOutput()">Copy</button>
  </div>
  <div class="output-body" id="output-body"></div>
</div>

<div class="disclaimer">
  ⚠️ Always review AI-generated emails before sending. Verify tone, facts, and recipient details.
</div>

<script>
  const API_URL = 'https://api.anthropic.com/v1/messages';
  const MODEL = 'claude-sonnet-4-20250514';

  async function generateEmail() {
    const context = document.getElementById('context').value.trim();
    if (!context) { alert('Please describe the purpose of the email.'); return; }

    const audience = document.getElementById('audience').value;
    const tone = document.getElementById('tone').value;
    const sender = document.getElementById('sender').value.trim();
    const recipient = document.getElementById('recipient-name').value.trim();

    const btn = document.getElementById('generate-btn');
    const card = document.getElementById('output-card');
    const body = document.getElementById('output-body');

    btn.disabled = true;
    btn.textContent = 'Generating…';
    card.style.display = 'block';
    body.innerHTML = `<div class="loading"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>Claude is drafting your email…</div>`;

    const prompt = `You are a professional email writing assistant. Write a complete, ready-to-send workplace email.

Recipient type: ${audience}
Tone: ${tone}
${sender ? 'Sender name and role: ' + sender : ''}
${recipient ? 'Recipient name: ' + recipient : ''}
Purpose / context: ${context}

Write the full email including:
- Subject line (labeled "Subject:")
- Greeting
- Body paragraphs
- Professional closing and sign-off

Keep it concise and appropriate for the context. Output ONLY the email — no explanations, no commentary, no markdown formatting.`;

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: MODEL,
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      const data = await response.json();
      const text = data.content?.[0]?.text || 'No response received.';
      body.textContent = text;
    } catch (err) {
      body.innerHTML = `<div class="error">Something went wrong. Please check your connection and try again.</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = '✦ Generate email';
    }
  }

  function copyOutput() {
    const text = document.getElementById('output-body').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = event.currentTarget;
      btn.textContent = 'Copied ✓';
      setTimeout(() => btn.textContent = 'Copy', 1800);
    });
  }
</script>

</body>
</html>
